<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Alternance IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div class="min-h-screen p-8">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">🚀 Dashboard Alternance IT</h1>
            <p class="text-gray-600">Visualisation des offres scrapées sur Hellowork</p>
            <div id="stats" class="mt-4 text-xl font-semibold text-gray-700"></div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Les offres seront injectées ici -->
        </div>
    </div>

        <script>
        async function loadJobs() {
            try {
                const res = await fetch('/offres.json');
                if (!res.ok) throw new Error('Fichier non trouvé');
                const jobs = await res.json();
                
                const statsDiv = document.getElementById('stats');
                statsDiv.textContent = `${jobs.length} offres trouvées`;

                const grid = document.getElementById('grid');
                grid.innerHTML = jobs.map(job => `
                    <div class="card bg-white p-6 rounded-lg border border-gray-200">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-lg font-bold text-gray-800 leading-tight">${job.title}</h3>
                            <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">${job.contract}</span>
                        </div>
                        <p class="text-gray-600 font-medium mb-2">🏢 ${job.company}</p>
                        <p class="text-gray-500 text-sm mb-4">📍 ${job.location}</p>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-green-600 font-bold text-sm">${job.salary}</span>
                            <a href="${job.url}" target="_blank" class="text-blue-500 hover:text-blue-700 text-sm font-semibold">
                                Voir l'offre →
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Erreur:', err);
                document.getElementById('grid').innerHTML = '<p class="text-center text-red-500 w-full col-span-3">Impossible de charger offres.json. Vérifiez que le scraper a bien tourné.</p>';
            }
        }
        loadJobs();
    </script>
</body>
</html>
