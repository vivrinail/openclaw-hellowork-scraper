<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scraper Hellowork</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-sm text-center">
        <h2 class="text-xl font-bold mb-4 text-blue-600">🔍 Recherche Hellowork</h2>
        <input type="text" id="searchTerm" class="w-full border border-gray-300 p-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="ex: alternance informatique">
        <button id="startBtn" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">Lancer le scraping</button>
    </div>

    <script>
        document.getElementById('startBtn').addEventListener('click', () => {
            const term = document.getElementById('searchTerm').value;
            if (term && window.electronAPI) {
                window.electronAPI.sendSearch(term);
            }
        });
    </script>
</body>
</html>
